name: Release Helm Chart (OCI to GHCR)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-helm-chart:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package Helm chart
        run: |
          # If your chart is in a subfolder, replace "." with that path (e.g. "./charts/netbird")
          helm package . --destination ./packages

      - name: Push Helm chart to GHCR (OCI)
        run: |
          OWNER="${{ github.repository_owner }}"
          for chart in ./packages/*.tgz; do
            helm push "$chart" "oci://ghcr.io/${OWNER}/netbird"
          done