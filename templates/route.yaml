{{ if eq .Values.global.route.vendor "envoy" -}}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $fullName }}-server-management-timeouts
  namespace: ecumene
spec:
  targetRefs:
    - group: 'gateway.networking.k8s.io'
      kind: GRPCRoute
      name: {{ $fullName }}-server-management
  timeout:
    http:
      requestTimeout: 0s
      connectionIdleTimeout: 86400s
  tcpKeepalive:
    idleTime: 30s
    interval: 30s
    probes: 5

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: {{ $fullName }}-server-signal-timeouts
  namespace: ecumene
spec:
  targetRefs:
    - group: 'gateway.networking.k8s.io'
      kind: GRPCRoute
      name: {{ $fullName }}-server-signal
  timeout:
    http:
      requestTimeout: 0s
      connectionIdleTimeout: 86400s
  tcpKeepalive:
    idleTime: 30s
    interval: 30s
    probes: 5
{{- end }}



{{- end }}
