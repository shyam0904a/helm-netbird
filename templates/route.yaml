{{- if .Values.global.route.enabled -}}
{{- $fullName := include "netbird.fullname" . -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
  {{- with .Values.global.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.global.route.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  hostnames:
    - {{ default .Values.global.domain.global  | quote }}
  rules:
    - backendRefs:
        - group: ''
          kind: Service
          name: {{ $fullName }}-server
          port: {{ .Values.global.server.port }}
      matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /oauth2
        - path:
            type: PathPrefix
            value: /ws-proxy
        - path:
            type: PathPrefix
            value: /relay
      timeouts:
        request: 3600s
        backendRequest: 3600s


