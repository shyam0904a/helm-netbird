apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netbird.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
stringData:
  config.yaml: |
    server:
      listenAddress: ":{{ .Values.global.server.port }}"
      exposedAddress: "https://{{ .Values.global.domain.global }}:443"
      stunPorts:
        - {{ .Values.global.server.stun_port }}
      metricsPort: 9090
      healthcheckAddress: ":9000"
      logLevel: "info"
      logFile: "console"
    
      authSecret: "{{.Values.global.server.authSecret}}"
      dataDir: {{ .Values.server.persistence.dataDir }}
    
      auth:
        issuer: "https://{{ .Values.global.domain.global }}/oauth2"
        signKeyRefreshEnabled: true
        dashboardRedirectURIs:
          - "https://{{ .Values.global.domain.global }}/nb-auth"
          - "https://{{ .Values.global.domain.global }}/nb-silent-auth"
        cliRedirectURIs:
          - "http://localhost:53000/"
    
      reverseProxy:
        trustedHTTPProxies:
          - "0.0.0.0/0"

      store:
        engine: "sqlite"
        encryptionKey: {{ .Values.global.server.encryption_key }}
      
      {{- if and .Values.stuns .Values.stuns.enabled }}
      stuns:
        - uri: "{{ .Values.stuns.url }}"
          proto: "udp"
      {{- end }}

      {{- if and .Values.relays .Values.relays.enabled }}
      relays:
        addresses:
          - "{{ .Values.relays.address }}"
        secret: "{{ .Values.relays.secret }}"
        credentialsTTL: "24h"
      {{- end }}

      {{- if and .Values.signal .Values.signal.enabled }}
      signalUri: "{{ .Values.signal.signalUri }}"
      {{- end }}