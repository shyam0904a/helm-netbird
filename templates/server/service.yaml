apiVersion: v1
kind: Service
metadata:
  name: {{ include "netbird.fullname" . }}-server
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "netbird.labels" . | nindent 4 }}
    netbird-app: {{ include "netbird.fullname" . }}-server
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - name: http
      targetPort: http
      protocol: TCP
      port: {{ .Values.global.server.port }}
    - name: stun
      targetPort: stun
      protocol: UDP
      port: {{ .Values.global.server.stun_port }}
  selector:
    {{- include "netbird.selectorLabels" . | nindent 4 }}
    netbird-app: {{ include "netbird.fullname" . }}-server
